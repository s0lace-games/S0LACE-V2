<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games — S0LACE2</title>
  <link rel="stylesheet" href="/assets/css/s0lace2.css" />
  <style>
    .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; animation: fade-up 0.6s 0.1s var(--ease) both; }
    .controls .search-wrap { flex: 1; max-width: 360px; }

    /* 6-COL GRID */
    .games-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; padding: 0.5rem; animation: fade-up 0.6s 0.2s var(--ease) both; }
    @media (max-width: 1100px) { .games-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (max-width: 900px)  { .games-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 680px)  { .games-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 460px)  { .games-grid { grid-template-columns: repeat(2, 1fr); } }

    .game-card {
      cursor: pointer; position: relative; overflow: hidden; border-radius: var(--r-lg);
      transition: transform var(--med) var(--ease), box-shadow var(--med) var(--ease);
      border: 1px solid var(--glass-border);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      background: var(--glass-1);
    }
    .game-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.14); border-color: var(--hairline-strong); }
    .game-card:hover .game-overlay { opacity: 1; }
    .game-card:hover .game-thumb { filter: grayscale(0%) brightness(0.7); }
    .game-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; filter: grayscale(35%) brightness(0.92); transition: filter var(--med) var(--ease); }
    .game-no-thumb {
      width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(155deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
      backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%);
    }
    .game-no-thumb svg { width: 26px; height: 26px; stroke: var(--ink-faint); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .game-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.92) 45%, transparent 100%); opacity: 0; transition: opacity var(--fast) var(--ease); display: flex; flex-direction: column; justify-content: flex-end; padding: 0.7rem; border-radius: var(--r-lg); }
    .game-play { width: 26px; height: 26px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; margin-bottom: 0.4rem; }
    .game-play svg { width: 9px; height: 9px; fill: white; stroke: none; }
    .game-name { font-family: var(--font-body); font-size: 0.62rem; font-weight: 500; letter-spacing: 0.01em; line-height: 1.3; color: var(--ink); }

    /* USER GAME DELETE BTN */
    .game-delete { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); color: #fff; font-size: 0.6rem; display: none; align-items: center; justify-content: center; cursor: pointer; border-radius: var(--r-sm); z-index: 10; line-height: 1; }
    .game-card:hover .game-delete { display: flex; }

    .empty-hint { font-family: var(--font-mono); font-size: 0.55rem; color: var(--ink-faint); margin-top: 0.5rem; line-height: 1.9; border: 1px dashed var(--glass-border); border-radius: var(--r-md); padding: 1rem 1.5rem; text-align: left; }
    .empty-hint code { color: var(--ink-dim); }
  </style>
</head>
<body>

<span class="corner tl"><span class="lens"></span> S0LACE2</span>

<div class="page">
  <div class="page-header">
    <h1 class="page-title">Games</h1>
  </div>

  <div class="controls" id="controls" style="display:none">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="search games..." autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <div class="loader" id="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
  <div class="games-grid" id="games-grid"></div>
</div>

<div class="modal" id="game-modal">
  <div class="modal-header">
    <div class="modal-title" id="modal-title"></div>
    <button class="modal-full" onclick="fullscreenGame()" id="full-btn">⛶ Fullscreen</button>
    <button class="modal-close" onclick="closeGame()">✕ Close</button>
  </div>
  <div class="modal-body">
    <iframe class="game-iframe" id="game-iframe" allow="autoplay; fullscreen"></iframe>
  </div>
</div>

<nav class="nav">
  <a class="nav-btn" href="/"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg><span class="nav-label">Home</span></a>
  <a class="nav-btn active" href="/g"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="11" r="1" fill="currentColor"/><circle cx="17" cy="13" r="1" fill="currentColor"/></svg><span class="nav-label">Games</span></a>
  <a class="nav-btn" href="/m"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg><span class="nav-label">Media</span></a>
  <a class="nav-btn" href="/s"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span class="nav-label">Settings</span></a>
</nav>

<script>
  let allGames = [];

  function fullscreenGame() {
    const el = document.getElementById("game-iframe");
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  }

  function proxyUrl(url) {
    if (typeof __uv$config !== "undefined") return __uv$config.prefix + __uv$config.encodeUrl(url);
    return "/uv/service/" + encodeURIComponent(url);
  }

  function cinemaProxy(url) {
    return "/uv/service/" + encodeURIComponent(url);
  }

  async function loadGames() {
    const override = window.S0LACE2_GAMES_OVERRIDE;
    if (override) {
      allGames = override;
    } else {
      // Always load local curated games first
      let base = [];
      try {
        const res = await fetch("/games/games-list.json");
        if (res.ok) base = await res.json();
      } catch {}

      // Then fetch approved community games from central API
      // Falls back gracefully if unreachable
      let community = [];
      try {
        const centralUrl = "https://astriex.vercel.app/api/community-games";
        const res = await fetch(centralUrl);
        if (res.ok) community = await res.json();
      } catch {}

      allGames = [...base, ...community];
    }
    // Always merge user-added games from localStorage
    const userGames = getUserGames().map(g => ({ ...g, _user: true }));
    const merged = [...allGames, ...userGames];
    document.getElementById("controls").style.display = "flex";
    renderGames(merged);
    document.getElementById("loader").style.display = "none";
  }

  function renderGames(games) {
    const grid = document.getElementById("games-grid");
    document.getElementById("loader").style.display = "none";
    grid.innerHTML = "";

    if (!games.length) { renderEmpty(); return; }

    games = [...games].sort((a, b) => a.title.localeCompare(b.title));

    // Suggest card
    const suggestCard = document.createElement("a");
    suggestCard.className = "suggest-card";
    suggestCard.href = "https://docs.google.com/forms/d/e/1FAIpQLScF9N42An_0b6aJ_GBgF1ksfDqkGkw7ni_tzxN25Y611UjJ6A/viewform";
    suggestCard.target = "_blank";
    suggestCard.rel = "noopener";
    suggestCard.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span class="suggest-label">Suggest Game</span>`;
    grid.appendChild(suggestCard);

    // Add Game card
    const addCard = document.createElement("div");
    addCard.className = "add-game-card";
    addCard.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="add-game-label">Add Game</span>`;
    addCard.addEventListener("click", openAddModal);
    grid.appendChild(addCard);

    games.forEach((game, i) => {
      const card = document.createElement("div");
      card.className = "game-card";
      card.style.cssText = `animation:fade-up 0.4s ${i*0.03}s ease both`;
      card.innerHTML = game.thumbnail
        ? `<img class="game-thumb" src="${game.thumbnail}" alt="${game.title}" loading="lazy"/>
           <div class="game-overlay"><div class="game-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div><div class="game-name">${game.title}</div></div>`
        : `<div class="game-no-thumb"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="11" r="1" fill="currentColor"/><circle cx="17" cy="13" r="1" fill="currentColor"/></svg></div>
           <div class="game-overlay"><div class="game-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div><div class="game-name">${game.title}</div></div>`;
      card.addEventListener("click", () => openGame(game));
      // Delete button for user-added games
      if (game._user) {
        const del = document.createElement("button");
        del.className = "game-delete";
        del.innerHTML = "✕";
        del.title = "Remove game";
        del.addEventListener("click", e => { e.stopPropagation(); deleteUserGame(game.id); });
        card.appendChild(del);
      }
      grid.appendChild(card);
    });
  }

  function renderEmpty() {
    document.getElementById("games-grid").innerHTML = `
      <div class="empty-state">
        <div class="empty-title">No games yet</div>
        <p class="empty-sub">Add a game to get started</p>
      </div>`;
  }

  function openGame(game) {
    document.getElementById("modal-title").textContent = game.title;
    document.getElementById("game-modal").classList.add("open");
    document.body.style.overflow = "hidden";
    const iframe = document.getElementById("game-iframe");
    if (game.url) {
      // External URL — run through UV proxy
      const prefix = (typeof __uv$config !== "undefined") ? __uv$config.prefix : "/uv/service/";
      const encode = (typeof __uv$config !== "undefined") ? __uv$config.encodeUrl : encodeURIComponent;
      iframe.src = prefix + encode(game.url);
    } else if (game.blobContent) {
      // HTML content — write into blob URL
      const blob = new Blob([game.blobContent], { type: "text/html" });
      iframe.src = URL.createObjectURL(blob);
    } else if (game.file) {
      iframe.src = game.file;
    }
  }

  function closeGame() {
    document.getElementById("game-modal").classList.remove("open");
    document.getElementById("game-iframe").src = "";
    document.body.style.overflow = "";
  }


  // ── ADD GAME SYSTEM ──
  let addTab = "url";
  let submitType = "url";
  let uploadedFileContent = null;
  let submitFileContent = null;
  let thumbDataUrl = null;

  function switchSubmitType(type) {
    submitType = type;
    ["url","upload","paste"].forEach(t => {
      document.getElementById("submit-type-" + t).style.display = t === type ? "block" : "none";
      const btn = document.getElementById("stype-" + t);
      btn.style.borderColor = t === type ? "rgba(255,255,255,0.8)" : "rgba(255,255,255,0.2)";
      btn.style.color = t === type ? "#fff" : "rgba(255,255,255,0.6)";
    });
  }

  function onSubmitFileChosen(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById("submit-upload-chosen").textContent = file.name;
    const reader = new FileReader();
    reader.onload = ev => { submitFileContent = ev.target.result; };
    reader.readAsText(file);
    if (!document.getElementById("add-title").value) {
      document.getElementById("add-title").value = file.name.replace(/\.html?$/i, "").replace(/[-_]/g, " ");
    }
  }

  function openAddModal() {
    document.getElementById("add-modal").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeAddModal() {
    document.getElementById("add-modal").classList.remove("open");
    document.body.style.overflow = "";
    // Reset
    document.getElementById("add-url").value = "";
    document.getElementById("add-title").value = "";
    document.getElementById("add-thumb-url").value = "";
    document.getElementById("add-paste").value = "";
    if(document.getElementById("submit-url")) document.getElementById("submit-url").value = "";
    if(document.getElementById("submit-paste")) document.getElementById("submit-paste").value = "";
    if(document.getElementById("submit-upload-chosen")) document.getElementById("submit-upload-chosen").textContent = "";
    submitFileContent = null;
    submitType = "url";
    switchSubmitType("url");
    document.getElementById("upload-chosen").textContent = "";
    document.getElementById("thumb-preview").innerHTML = '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
    uploadedFileContent = null;
    thumbDataUrl = null;
  }

  function switchAddTab(tab) {
    addTab = tab;
    document.querySelectorAll(".add-tab").forEach((t, i) => {
      t.classList.toggle("active", ["url","upload","paste","submit"][i] === tab);
    });
    document.querySelectorAll(".add-pane").forEach(p => p.classList.remove("active"));
    document.getElementById("add-pane-" + tab).classList.add("active");
  }

  function onFileChosen(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById("upload-chosen").textContent = file.name;
    const reader = new FileReader();
    reader.onload = ev => { uploadedFileContent = ev.target.result; };
    reader.readAsText(file);
    // Auto-fill title from filename
    if (!document.getElementById("add-title").value) {
      document.getElementById("add-title").value = file.name.replace(/\.html?$/i, "").replace(/[-_]/g, " ");
    }
  }

  function onThumbFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      thumbDataUrl = ev.target.result;
      document.getElementById("thumb-preview").innerHTML = '<img src="' + thumbDataUrl + '" />';
    };
    reader.readAsDataURL(file);
  }

  function previewThumb() {
    const url = document.getElementById("add-thumb-url").value.trim();
    if (url) {
      thumbDataUrl = null;
      document.getElementById("thumb-preview").innerHTML = '<img src="' + url + '" onerror="this.style.display=\'none\'" />';
    }
  }

  function getUserGames() {
    try { return JSON.parse(localStorage.getItem("s0lace2_user_games") || "[]"); }
    catch { return []; }
  }

  function saveUserGames(games) {
    localStorage.setItem("s0lace2_user_games", JSON.stringify(games));
  }

  function deleteUserGame(id) {
    const games = getUserGames().filter(g => g.id !== id);
    saveUserGames(games);
    reloadGames();
  }

  async function saveGame() {
    const title = document.getElementById("add-title").value.trim();
    if (!title) { alert("Please enter a title."); return; }
    const thumbUrl = thumbDataUrl || document.getElementById("add-thumb-url").value.trim() || null;

    // ── SUBMIT TO SITE (goes to admin review, not saved locally)
    if (addTab === "submit") {
      let payload = { title, thumbnail: thumbUrl };
      if (submitType === "url") {
        const url = document.getElementById("submit-url").value.trim();
        if (!url) { alert("Please enter a URL."); return; }
        payload.url = url;
      } else if (submitType === "upload") {
        if (!submitFileContent) { alert("Please choose an HTML file."); return; }
        payload.blobContent = submitFileContent;
      } else if (submitType === "paste") {
        const html = document.getElementById("submit-paste").value.trim();
        if (!html) { alert("Please paste some HTML."); return; }
        payload.blobContent = html;
      }
      try {
        const submitEndpoint = (window.S0LACE2_CENTRAL_API || "/api/community-games").replace("/api/community-games", "/api/submit");
        const r = await fetch(submitEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || "Failed");
        closeAddModal();
        alert("Submitted for review! It will appear on the site if approved.");
      } catch(e) { alert("Submission failed: " + e.message); }
      return;
    }

    // ── ADD LOCALLY (url, upload, paste tabs)
    const id = "user-" + Date.now();
    const game = { id, title, thumbnail: thumbUrl, _user: true };

    if (addTab === "url") {
      const url = document.getElementById("add-url").value.trim();
      if (!url) { alert("Please enter a URL."); return; }
      game.url = url;
    } else if (addTab === "upload") {
      if (!uploadedFileContent) { alert("Please choose an HTML file."); return; }
      game.blobContent = uploadedFileContent;
    } else if (addTab === "paste") {
      const html = document.getElementById("add-paste").value.trim();
      if (!html) { alert("Please paste some HTML."); return; }
      game.blobContent = html;
    }

    const existing = getUserGames();
    existing.push(game);
    saveUserGames(existing);
    closeAddModal();
    reloadGames();
  }

  function reloadGames() {
    const userGames = getUserGames().map(g => ({ ...g, _user: true }));
    allGames = [...allGames.filter(g => !g._user), ...userGames];
    renderGames(allGames);
  }

  document.getElementById("search-input").addEventListener("input", e => {
    const q = e.target.value.trim().toLowerCase();
    const userGames = getUserGames().map(g => ({ ...g, _user: true }));
    const all = [...allGames.filter(g => !g._user), ...userGames];
    renderGames(q ? all.filter(g => g.title.toLowerCase().includes(q)) : all);
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeGame(); });

  loadGames();
</script>

<!-- ADD GAME MODAL -->
<div class="add-modal" id="add-modal">
  <div class="add-box">
    <div class="add-box-title">Add a Game</div>

    <!-- Tabs -->
    <div class="add-tabs">
      <button class="add-tab active" onclick="switchAddTab('url')">Link / URL</button>
      <button class="add-tab" onclick="switchAddTab('upload')">Upload HTML</button>
      <button class="add-tab" onclick="switchAddTab('paste')">Paste HTML</button>
      <button class="add-tab" onclick="switchAddTab('submit')">Submit to Site</button>
    </div>

    <!-- URL pane -->
    <div class="add-pane active" id="add-pane-url">
      <div class="add-field">
        <label class="add-label">Game URL</label>
        <input class="add-input" id="add-url" type="text" placeholder="https://game-site.com" />
      </div>
    </div>

    <!-- Upload pane -->
    <div class="add-pane" id="add-pane-upload">
      <label class="upload-btn" for="add-file-input">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Choose HTML File
      </label>
      <input type="file" id="add-file-input" accept=".html,.htm" style="display:none" onchange="onFileChosen(event)" />
      <div class="upload-chosen" id="upload-chosen"></div>
    </div>

    <!-- Paste pane -->
    <div class="add-pane" id="add-pane-paste">
      <div class="add-field">
        <label class="add-label">Paste HTML Code</label>
        <textarea class="add-input add-textarea" id="add-paste" placeholder="<!DOCTYPE html>..."></textarea>
      </div>
    </div>
    <!-- Submit pane -->
    <div class="add-pane" id="add-pane-submit">
      <div style="font-family:var(--font-body);font-size:0.62rem;line-height:1.8;color:var(--ink-faint);">Submit a game for review. If approved it will appear on the site for everyone.</div>
      <div style="display:flex;gap:0.4rem;margin-top:0.25rem;">
        <button class="add-btn" id="stype-url" onclick="switchSubmitType('url')" style="flex:1;font-size:0.5rem;padding:0.4rem 0.5rem;">Link</button>
        <button class="add-btn" id="stype-upload" onclick="switchSubmitType('upload')" style="flex:1;font-size:0.5rem;padding:0.4rem 0.5rem;">Upload HTML</button>
        <button class="add-btn" id="stype-paste" onclick="switchSubmitType('paste')" style="flex:1;font-size:0.5rem;padding:0.4rem 0.5rem;">Paste HTML</button>
      </div>
      <div id="submit-type-url">
        <div class="add-field">
          <label class="add-label">Game URL</label>
          <input class="add-input" id="submit-url" type="text" placeholder="https://game-site.com" />
        </div>
      </div>
      <div id="submit-type-upload" style="display:none">
        <label class="upload-btn" for="submit-file-input">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Choose HTML File
        </label>
        <input type="file" id="submit-file-input" accept=".html,.htm" style="display:none" onchange="onSubmitFileChosen(event)" />
        <div class="upload-chosen" id="submit-upload-chosen"></div>
      </div>
      <div id="submit-type-paste" style="display:none">
        <div class="add-field">
          <label class="add-label">Paste HTML Code</label>
          <textarea class="add-input add-textarea" id="submit-paste" placeholder="<!DOCTYPE html>..."></textarea>
        </div>
      </div>
    </div>

    <!-- Shared fields -->
    <div class="add-field">
      <label class="add-label">Game Title</label>
      <input class="add-input" id="add-title" type="text" placeholder="My Game" />
    </div>

    <div class="add-field">
      <label class="add-label">Thumbnail</label>
      <div class="add-thumb-row">
        <div class="add-thumb-preview" id="thumb-preview">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:0.5rem;">
          <input class="add-input" id="add-thumb-url" type="text" placeholder="Image URL (optional)" oninput="previewThumb()" />
          <label class="upload-btn" for="add-thumb-file" style="padding:0.4rem 0.75rem;font-size:0.5rem;">
            Upload Image
          </label>
          <input type="file" id="add-thumb-file" accept="image/*" style="display:none" onchange="onThumbFile(event)" />
        </div>
      </div>
    </div>

    <div class="add-row-btns">
      <button class="add-btn" onclick="closeAddModal()">Cancel</button>
      <button class="add-btn primary" onclick="saveGame()">Add Game</button>
    </div>
  </div>
</div>
