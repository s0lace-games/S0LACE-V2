<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S0LACE2</title>
  <link rel="stylesheet" href="/assets/css/s0lace2.css" />
  <style>
    .page-shell { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 2rem; padding-bottom: 6rem; position: relative; z-index: 1; }
    .wordmark {
      font-family: var(--font-mono); font-weight: 600; font-size: clamp(2.6rem, 8vw, 4.6rem);
      letter-spacing: 0.01em; line-height: 1; margin-bottom: 0.3em; animation: fade-up 0.8s var(--ease) both;
      display: flex; align-items: center;
    }
    .wordmark .lens {
      display: inline-block; width: 0.72em; height: 0.72em; border-radius: 50%; margin: 0 0.02em;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.15) 60%, rgba(255,255,255,0.35) 100%);
      box-shadow: 0 0 20px rgba(255,255,255,0.5), inset 0 0 8px rgba(255,255,255,0.6);
      transform: translateY(0.03em);
    }
    .tagline { font-family: var(--font-mono); font-size: 0.65rem; color: var(--ink-faint); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 2.5rem; animation: fade-up 0.8s 0.1s var(--ease) both; }
    #url-input-wrap { width: 100%; max-width: 560px; animation: fade-up 0.8s 0.2s var(--ease) both; }
    .shortcuts { display: flex; gap: 1.5rem; margin-top: 2rem; animation: fade-up 0.8s 0.3s var(--ease) both; }
    .shortcut { font-family: var(--font-mono); font-size: 0.6rem; color: var(--ink-faint); letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: color var(--fast) var(--ease); }
    .shortcut:hover { color: var(--ink); }
    #status { margin-top: 1rem; font-family: var(--font-mono); font-size: 0.6rem; color: var(--ink-faint); letter-spacing: 0.1em; min-height: 1em; animation: fade-up 0.8s 0.35s var(--ease) both; }
  </style>
</head>
<body>

<span class="corner tl"><span class="lens"></span> S0LACE2</span>
<span class="corner br">v1.1.0</span>

<div class="page-shell">

  <p class="tagline">Beta</p>

    <input id="url-input" type="text" placeholder="enter a url or search query..." autocomplete="off" spellcheck="false" />
    <button id="go-btn">Go</button>
  </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/global.js"></script>
<script>
  const UV_PREFIX = "/uv/service/";
  const SW_PATH = "/uv/sw.js";
  const SW_SCOPE = "/uv/service/";

  function navigate(url) {
    if (!url) return;
    if (!url.startsWith("http://") && !url.startsWith("https://")) {
      url = url.includes(".") && !url.includes(" ") ? "https://" + url : (window.S0LACE2_SEARCH || "https://duckduckgo.com/?q=") + encodeURIComponent(url);
    }
    const prefix = typeof __uv$config !== "undefined" ? __uv$config.prefix : UV_PREFIX;
    const encode = typeof __uv$config !== "undefined" ? __uv$config.encodeUrl : encodeURIComponent;
    location.href = prefix + encode(url);
  }
  function setInput(url) { document.getElementById("url-input").value = url; document.getElementById("url-input").focus(); }
  document.getElementById("go-btn").addEventListener("click", () => navigate(document.getElementById("url-input").value.trim()));
  document.getElementById("url-input").addEventListener("keydown", (e) => { if (e.key === "Enter") navigate(document.getElementById("url-input").value.trim()); });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register(SW_PATH, { scope: SW_SCOPE })
      .then(() => {  })
      .catch((e) => {  });
  }
</script>
