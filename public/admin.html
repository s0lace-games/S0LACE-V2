<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — S0LACE2</title>
  <link rel="stylesheet" href="/assets/css/s0lace2.css" />
  <style>
    .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; position: relative; z-index: 1; }
    .login-box { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 1rem; }
    .login-title { font-family: var(--font-display); font-weight: 600; font-size: 2.2rem; display: flex; align-items: center; gap: 0.3rem; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }
    .field label { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); }
    .field input { background: var(--glass-2); border: 1px solid var(--glass-border); border-radius: var(--r-md); color: var(--ink); font-family: var(--font-body); font-size: 0.78rem; padding: 0.7rem 0.9rem; outline: none; transition: border-color var(--fast) var(--ease); }
    .field input:focus { border-color: var(--hairline-strong); }
    .btn { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.65rem 1.2rem; border: 1px solid var(--glass-border); border-radius: var(--r-pill); background: var(--glass-2); color: var(--ink-dim); cursor: pointer; transition: all var(--fast) var(--ease); margin-top: 0.5rem; }
    .btn:hover { border-color: var(--hairline-strong); color: var(--ink); background: var(--glass-3); }
    .btn.primary { background: var(--white); color: var(--void) !important; border-color: transparent; }
    .btn.primary:hover { background: var(--ink-dim); }
    .err { font-family: var(--font-body); font-size: 0.65rem; color: var(--bad); margin-top: 0.25rem; }

    .dashboard { display: none; padding: 3rem 2rem 4rem; max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
    .dash-header { margin-bottom: 2.5rem; display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .dash-title { font-family: var(--font-display); font-weight: 600; font-size: 2.2rem; }
    .dash-sub { font-family: var(--font-mono); font-size: 0.55rem; color: var(--ink-faint); letter-spacing: 0.16em; text-transform: uppercase; }
    .section-label { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--hairline); }
    .empty { font-family: var(--font-mono); font-size: 0.65rem; color: var(--ink-faint); padding: 2rem 0; }

    .card {
      background: var(--glass-1); border: 1px solid var(--glass-border); border-radius: var(--r-lg);
      padding: 1.25rem; margin-bottom: 0.75rem; display: flex; gap: 1rem; align-items: flex-start;
    }
    .card-thumb { width: 56px; height: 56px; border-radius: var(--r-md); object-fit: cover; background: var(--glass-2); flex-shrink: 0; }
    .card-thumb-placeholder { width: 56px; height: 56px; border-radius: var(--r-md); background: var(--glass-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .card-thumb-placeholder svg { width: 20px; height: 20px; stroke: var(--ink-faint); fill: none; stroke-width: 1.5; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-family: var(--font-body); font-weight: 500; font-size: 0.8rem; margin-bottom: 0.3rem; }
    .card-url { font-family: var(--font-mono); font-size: 0.58rem; color: var(--ink-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.4rem; }
    .card-date { font-family: var(--font-mono); font-size: 0.5rem; color: var(--ink-faint); opacity: 0.7; }
    .card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; align-self: center; }

    .badge { display: inline-flex; font-family: var(--font-mono); font-size: 0.48rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: var(--r-pill); margin-left: 0.5rem; vertical-align: middle; }
    .badge.approved { background: rgba(111,207,151,0.12); color: var(--good); border: 1px solid rgba(111,207,151,0.3); }

    .tabs { display: flex; gap: 0.3rem; margin-bottom: 2rem; }
    .tab { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.6rem 1.1rem; background: var(--glass-1); border: 1px solid transparent; border-radius: var(--r-pill); color: var(--ink-faint); cursor: pointer; transition: all var(--fast) var(--ease); }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--void); background: var(--white); }

    .playtest-modal { display: none; position: fixed; inset: 0; background: rgba(6,6,7,0.97); z-index: 999; flex-direction: column; }
    .playtest-modal.open { display: flex; }
    .playtest-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.4rem; border-bottom: 1px solid var(--hairline); flex-shrink: 0; gap: 1rem; background: var(--glass-1); }
    .playtest-title { font-family: var(--font-display); font-weight: 600; font-size: 1.1rem; }
    .playtest-body { flex: 1; position: relative; background: #000; }
    .playtest-iframe { width: 100%; height: 100%; border: none; display: block; position: absolute; inset: 0; }
    .playtest-actions { display: flex; gap: 0.5rem; }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem; background: var(--glass-2); border: 1px solid var(--glass-border);
      border-radius: var(--r-md); padding: 0.75rem 1.25rem; font-family: var(--font-body); font-size: 0.68rem;
      opacity: 0; transition: opacity var(--med) var(--ease); pointer-events: none; z-index: 999;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .toast.show { opacity: 1; }
    .toast.ok { border-color: rgba(111,207,151,0.4); color: var(--good); }
    .toast.err { border-color: rgba(224,133,133,0.4); color: var(--bad); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login-screen">
  <div class="login-box glass" style="padding: 2.5rem;">
    <div>
      <div class="login-title"><span class="lens" style="display:inline-block;width:0.7em;height:0.7em;border-radius:50%;background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.15) 60%, rgba(255,255,255,0.35) 100%);box-shadow:0 0 12px rgba(255,255,255,0.5);"></span>Admin</div>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass-input" placeholder="Enter admin password" />
      <div class="err" id="login-err"></div>
    </div>
    <button class="btn primary" onclick="doLogin()">Enter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-title">Game Submissions</div>
      <div class="dash-sub" style="margin-top:0.3rem">Review &amp; approve community games</div>
    </div>
    <button class="btn" onclick="logout()">Log out</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending')">Pending <span id="pending-count"></span></button>
    <button class="tab" onclick="switchTab('approved')">Approved</button>
  </div>

  <div id="tab-pending">
    <div class="section-label">Awaiting Review</div>
    <div id="pending-list"><div class="empty">Loading...</div></div>
  </div>

  <div id="tab-approved" style="display:none">
    <div class="section-label">Approved Games</div>
    <div id="approved-list"><div class="empty">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminPass = "";
  let currentTab = "pending";

  // ── LOGIN ──
  document.getElementById("pass-input").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    const pass = document.getElementById("pass-input").value;
    const res = await fetch("/api/admin/pending", { headers: { "x-admin-password": pass } });
    if (res.status === 401) { document.getElementById("login-err").textContent = "Wrong password."; return; }
    adminPass = pass;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadPending();
    loadApproved();
  }

  function logout() {
    adminPass = "";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("pass-input").value = "";
  }

  // ── TABS ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", ["pending","approved"][i] === tab));
    document.getElementById("tab-pending").style.display  = tab === "pending"  ? "block" : "none";
    document.getElementById("tab-approved").style.display = tab === "approved" ? "block" : "none";
  }

  // ── LOAD PENDING ──
  async function loadPending() {
    const res  = await fetch("/api/admin/pending", { headers: { "x-admin-password": adminPass } });
    const list = await res.json();
    const el   = document.getElementById("pending-list");
    const cnt  = document.getElementById("pending-count");
    cnt.textContent = list.length ? `(${list.length})` : "";
    if (!list.length) { el.innerHTML = '<div class="empty">No pending submissions.</div>'; return; }
    el.innerHTML = "";
    list.forEach(game => el.appendChild(makePendingCard(game)));
  }

  // ── LOAD APPROVED ──
  async function loadApproved() {
    const res  = await fetch("/api/games");
    const all  = await res.json();
    // Only community (submitted) games have submittedAt
    const list = all.filter(g => g.submittedAt);
    const el   = document.getElementById("approved-list");
    if (!list.length) { el.innerHTML = '<div class="empty">No approved community games yet.</div>'; return; }
    el.innerHTML = "";
    list.forEach(game => el.appendChild(makeApprovedCard(game)));
  }

  // ── CARD BUILDERS ──
  function thumbEl(game) {
    if (game.thumbnail) return `<img class="card-thumb" src="${game.thumbnail}" onerror="this.style.display='none'" />`;
    return `<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  }

  function makePendingCard(game) {
    const div = document.createElement("div");
    div.className = "card";
    div.id = `card-${game.id}`;
    div.innerHTML = `
      ${thumbEl(game)}
      <div class="card-info">
        <div class="card-title">${game.title}</div>
        <div class="card-url">${game.url}</div>
        <div class="card-date">Submitted ${new Date(game.submittedAt).toLocaleString()}</div>
      </div>
      <div class="card-actions">
        <button class="btn" onclick="playtest(${JSON.stringify(game).replace(/"/g, '&quot;')})">▶ Test</button>
        <button class="btn approve" onclick="approve('${game.id}')">✓ Approve</button>
        <button class="btn deny" onclick="deny('${game.id}')">✕ Deny</button>
      </div>`;
    return div;
  }

  function makeApprovedCard(game) {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      ${thumbEl(game)}
      <div class="card-info">
        <div class="card-title">${game.title} <span class="badge approved">Approved</span></div>
        <div class="card-url">${game.url}</div>
        <div class="card-date">Submitted ${new Date(game.submittedAt).toLocaleString()}</div>
      </div>`;
    return div;
  }

  // ── APPROVE / DENY ──
  async function approve(id) {
    const res = await fetch(`/api/admin/approve/${id}`, { method: "POST", headers: { "x-admin-password": adminPass } });
    if (!res.ok) { toast("Failed to approve", "err"); return; }
    document.getElementById(`card-${id}`)?.remove();
    toast("Game approved ✓", "ok");
    loadPending();
    loadApproved();
  }

  async function denyDirect(id) {
    const res = await fetch(`/api/admin/deny/${id}`, { method: "POST", headers: { "x-admin-password": adminPass } });
    if (!res.ok) { toast("Failed to deny", "err"); return; }
    document.getElementById(`card-${id}`)?.remove();
    toast("Submission denied.", "err");
    loadPending();
  }

  async function deny(id) {
    if (!confirm("Deny and delete this submission?")) return;
    const res = await fetch(`/api/admin/deny/${id}`, { method: "POST", headers: { "x-admin-password": adminPass } });
    if (!res.ok) { toast("Failed to deny", "err"); return; }
    document.getElementById(`card-${id}`)?.remove();
    toast("Submission denied.", "err");
    loadPending();
  }

  // ── PLAYTEST ──
  let playtestId = null;

  function playtest(game) {
    playtestId = game.id;
    document.getElementById("playtest-title").textContent = game.title;
    document.getElementById("playtest-modal").classList.add("open");

    // Load game — proxy URL if it's a URL-based game
    const iframe = document.getElementById("playtest-iframe");
    if (game.url) {
      iframe.src = game.url; // direct for admin preview
    } else if (game.blobContent) {
      const blob = new Blob([game.blobContent], { type: "text/html" });
      iframe.src = URL.createObjectURL(blob);
    }

    // Wire approve/deny buttons
    document.getElementById("playtest-approve-btn").onclick = async () => {
      await approve(playtestId);
      closePlaytest();
    };
    document.getElementById("playtest-deny-btn").onclick = async () => {
      if (!confirm("Deny and delete this submission?")) return;
      await denyDirect(playtestId);
      closePlaytest();
    };
  }

  function closePlaytest() {
    document.getElementById("playtest-modal").classList.remove("open");
    document.getElementById("playtest-iframe").src = "";
    playtestId = null;
  }

  // ── TOAST ──
  function toast(msg, type = "ok") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.classList.remove("show"), 3000);
  }
</script>
<!-- PLAYTEST MODAL -->
<div class="playtest-modal" id="playtest-modal">
  <div class="playtest-header">
    <div class="playtest-title" id="playtest-title">Playtesting...</div>
    <div class="playtest-actions">
      <button class="btn approve" id="playtest-approve-btn">✓ Approve</button>
      <button class="btn deny" id="playtest-deny-btn">✕ Deny</button>
      <button class="btn" onclick="closePlaytest()">✕ Close</button>
    </div>
  </div>
  <div class="playtest-body">
    <iframe class="playtest-iframe" id="playtest-iframe" allow="autoplay; fullscreen"></iframe>
  </div>
</div>

<div id="s0lace2-bg"></div>
</body>
</html>
